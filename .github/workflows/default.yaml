name: DevOps Test Task

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./front
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/front:latest
        platforms: linux/amd64,linux/arm64

    - name: Build API
      uses: docker/build-push-action@v5
      with:
        context: ./api
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/api:latest
        platforms: linux/amd64,linux/arm64

    - name: Send Discord Alert
      if: always()
      run: |
        curl -H "Content-Type: application/json" -d "{\"content\": \"Build complete\"}" ${{ secrets.DISCORD_WEBHOOK }}

    - name: CD with SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 700 ~/.ssh
        chmod 600 ~/.ssh/id_rsa

        ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

        ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          cd /home/github/project

          docker pull ghcr.io/${{ github.repository_owner }}/ictis-work-test-task-front:latest
          docker pull ghcr.io/${{ github.repository_owner }}/ictis-work-test-task-api:latest

          docker compose down
          docker compose up -d
        EOF

